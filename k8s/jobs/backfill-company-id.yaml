# One-off Job: backfill internal Company.id (CUID) for rows where id IS NULL.
# NOT applied by Flux — use: kubectl create -f k8s/jobs/backfill-company-id.yaml
#
# Run AFTER migration `add_company_internal_id` and BEFORE `require_company_internal_id`.
# See doc/COMPANY_ID_MIGRATION.md for the full rollout.
#
# - For dry-run only, set args to: ["scripts/backfill-company-id.ts", "--dry-run"]
# - Pin `image:` to a tag that includes scripts/backfill-company-id.ts before running.

apiVersion: batch/v1
kind: Job
metadata:
  generateName: backfill-company-id-
  labels:
    app: garbo
    job-type: backfill-company-id
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 0
  activeDeadlineSeconds: 1800
  template:
    metadata:
      labels:
        app: garbo
        job-type: backfill-company-id
    spec:
      restartPolicy: Never
      containers:
        - name: backfill
          image: ghcr.io/klimatbyran/garbo
          imagePullPolicy: Always
          workingDir: /app
          command: ['npx', '--yes', 'tsx']
          args: ['scripts/backfill-company-id.ts']
          resources:
            requests:
              cpu: '100m'
              memory: '256Mi'
            limits:
              memory: '512Mi'
          envFrom:
            - secretRef:
                name: env
          env:
            - name: NODE_ENV
              value: production
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql
                  key: postgres-password
            - name: DATABASE_URL
              value: postgresql://postgres:$(POSTGRES_PASSWORD)@postgresql:5432/garbo
